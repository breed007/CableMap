services:
  cablemap:
    build: .
    container_name: cablemap
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - cablemap_data:/data
    environment:
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-changeme-set-in-env}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - DATA_DIR=/data
      - DB_PATH=/data/cablemap.db

volumes:
  cablemap_data:
    driver: local
